<!doctype html>
<html lang="pl">
<body style="margin:0">
  <iframe id="f" src="index.html" style="width:1400px;height:1800px;border:0"></iframe>
  <pre id="out"></pre>
  <script>
    const f = document.getElementById('f');
    const out = document.getElementById('out');

    f.addEventListener('load', () => {
      setTimeout(async () => {
        const w = f.contentWindow;
        const d = w.document;
        w.showPage('infographics', 'inf-parts');

        setTimeout(async () => {
          const translatedText = 'Translated prompt heading for PNG export';
          d.querySelector('#inf-parts .infographic-summary-band strong').textContent = translatedText;

          const payload = await w.buildInfographicSvgPayload('inf-parts');
          const svgHasTranslatedText = payload.svg.includes(translatedText);

          w.triggerBlobDownload = (filename, blob) => {
            out.textContent = JSON.stringify({
              filename,
              type: blob.type,
              size: blob.size,
              svgHasTranslatedText
            }, null, 2);
            document.body.dataset.done = '1';
          };

          await w.exportInfographicPng('inf-parts');
        }, 1200);
      }, 800);
    });
  </script>
</body>
</html>
